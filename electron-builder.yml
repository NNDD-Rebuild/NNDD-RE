appId: org.mineap.nndd-re
productName: NNDD-RE
directories:
  buildResources: build
  output: dist
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.{js,ts,mjs,cjs}"
  - "!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
  - "!{.env,.env.*,.npmrc,pnpm-lock.yaml}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
asar: true
asarUnpack:
  - resources/**
win:
  executableName: NNDD-RE
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
nsis:
  artifactName: ${productName}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  category: public.app-category.video
  icon: build/icon.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64
linux:
  icon: build/icon.png
  maintainer: NNDD-Rebuild <NNDD-Rebuild@users.noreply.github.com>
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: rpm
      arch:
        - x64
    - target: tar.gz
      arch:
        - x64
  category: AudioVideo
publish:
  provider: github
  owner: NNDD-Rebuild
  repo: NNDD-RE
  releaseType: release
